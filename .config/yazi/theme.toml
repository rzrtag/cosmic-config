# ~/.config/yazi/theme.toml
# Catppuccin Mocha Theme for Yazi

[manager]
cwd = { fg = "#89dceb", bold = true }

# Character used for pane borders (setting to space for minimal look)
border_symbol = " "
border_style  = { fg = "#313244" }

# Hovered item
hovered       = { fg = "#1e1e2e", bg = "#89b4fa" }
# Selected items
preview_hovered = { underline = true }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#313244", bg = "#313244" }

# Mode colors
mode_normal = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
mode_select = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
mode_unset  = { fg = "#1e1e2e", bg = "#f5c2e7", bold = true }

# Progress bar
progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#89b4fa", bg = "#313244" }
progress_error  = { fg = "#f38ba8", bg = "#313244" }

# Permissions
permissions_t = { fg = "#89b4fa" }
permissions_r = { fg = "#f9e2af" }
permissions_w = { fg = "#f38ba8" }
permissions_x = { fg = "#a6e3a1" }
permissions_s = { fg = "#7f849c" }

[filetype]
rules = [
    # Images
    { mime = "image/*", fg = "#89dceb" },
    # Videos
    { mime = "video/*", fg = "#f9e2af" },
    # Audio
    { mime = "audio/*", fg = "#f9e2af" },
    # Archives
    { mime = "application/{tar,bzip*,7z*,zip,rar}", fg = "#f5c2e7" },
    # Code
    { mime = "text/*", fg = "#cdd6f4" },
    # Fallback
    { name = "*", fg = "#cdd6f4" }
]

[input]
border   = { fg = "#89b4fa" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#89b4fa" }
active   = { fg = "#f5c2e7" }
inactive = {}

[tasks]
border   = { fg = "#89b4fa" }
title    = {}
hovered  = { underline = true }

[which]
mask            = { bg = "#313244" }
cand            = { fg = "#89dceb" }
rest            = { fg = "#9399b2" }
desc            = { fg = "#f5c2e7" }
separator       = " ➜ "
separator_style = { fg = "#585b70" }

[help]
on      = { fg = "#f5c2e7" }
run     = { fg = "#89dceb" }
desc    = { fg = "#9399b2" }
hovered = { bg = "#585b70", bold = true }
footer  = { fg = "#313244", bg = "#cdd6f4" }

[notify]
title_info  = { fg = "#a6e3a1" }
title_warn  = { fg = "#f9e2af" }
title_error = { fg = "#f38ba8" }
