# ~/.config/yazi/keymap.toml

[manager]
keymap = [
    { on = [ "<Esc>" ], run = "escape", desc = "Exit visual mode, clear selection, or cancel input" },
    { on = [ "q" ],     run = "quit", desc = "Quit the process" },
    { on = [ "Q" ],     run = "quit --no-cwd-file", desc = "Quit without emitting directory state" },
    
    # Vim-style Core Navigation
    { on = [ "k" ], run = "arrow -1", desc = "Move cursor up" },
    { on = [ "j" ], run = "arrow 1",  desc = "Move cursor down" },
    { on = [ "h" ], run = "leave",    desc = "Go back to parent directory" },
    { on = [ "l" ], run = "enter",    desc = "Enter child directory" },
    { on = [ "K" ], run = "seek -5",  desc = "Seek up 5 units in preview" },
    { on = [ "J" ], run = "seek 5",   desc = "Seek down 5 units in preview" },
    { on = [ "g", "g" ], run = "arrow top", desc = "Move cursor to the top" },
    { on = [ "G" ], run = "arrow bot",  desc = "Move cursor to the bottom" },
    
    # Advanced Search & Subtree Navigation
    { on = [ "z" ], run = "plugin zoxide", desc = "Jump to directory via zoxide" },
    { on = [ "f" ], run = "filter --smart", desc = "Filter files seamlessly" },
    { on = [ "/" ], run = "find --smart", desc = "Find next file in current tree" },
    { on = [ "s" ], run = "search fd", desc = "Search files by name using fd" },
    { on = [ "w" ], run = "search rg", desc = "Search files by content using ripgrep" },
    
    # File System Operations
    { on = [ "d" ], run = "remove", desc = "Trash selected files" },
    { on = [ "D" ], run = "remove --permanently", desc = "Permanently delete selected files" },
    { on = [ "y" ], run = "yank", desc = "Yank (copy) selected files" },
    { on = [ "x" ], run = "yank --cut", desc = "Cut selected files" },
    { on = [ "p" ], run = "paste", desc = "Paste yanked files" },
    { on = [ "P" ], run = "paste --force", desc = "Paste yanked files (overwrite)" },
    { on = [ "r" ], run = "rename", desc = "Rename selected file" },
    { on = [ "a" ], run = "create", desc = "Create file/directory (directories end with /)" },
    { on = [ "." ], run = "hidden toggle", desc = "Toggle visibility of hidden files" }
]
