# ~/.config/yazi/yazi.toml

[manager]
# Modern schema supports both 'manager' and 'mgr'
# We use [0, 1, 1] to ensure parent is strictly hidden
ratio          = [ 0, 1, 1 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]

[preview]
tab_size        = 2
max_width       = 1600
max_height      = 1600
cache_dir       = ""
# FORCE Sixel to bypass terminal detection timeouts
# This resolves the "ASCII fallback" issue in COSMIC Terminal
image_filter    = "lanczos3"
image_quality   = 90
sixel_fraction  = 10
wrap            = "yes"

[opener]
edit = [
    { run = 'cosmic-edit "$@"', block = true, desc = "Edit" },
]
play = [
    { run = 'mpv "$@"', orphan = true, for = "unix" },
]
open = [
    { run = 'xdg-open "$@"', desc = "Open" },
]

[open]
rules = [
    { name = "*/", use = [ "edit", "open" ] },
    { mime = "text/*", use = [ "edit", "open" ] },
    { mime = "image/*", use = [ "open" ] },
    { mime = "video/*", use = [ "play", "open" ] },
    { mime = "audio/*", use = [ "play", "open" ] },
    { mime = "application/json", use = [ "edit", "open" ] },
    { mime = "*", use = [ "open" ] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912  # 512MB
image_bound      = [ 0, 0 ]
suppress_preload = false
